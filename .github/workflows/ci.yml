name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust (cargo check + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: System deps for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo check
        run: cargo check --all-targets
      - name: cargo test
        run: cargo test --tests
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Install cargo-audit
        uses: baptiste0928/cargo-install@v3
        with:
          crate: cargo-audit
          locked: true
      - name: cargo audit
        run: cargo audit

  frontend:
    name: Frontend (vite build + tsc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm audit --omit=dev
      - run: npm run lint
      - run: npm test
      - run: npm run build

  next-web:
    name: Next.js web (src lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/medoc?schema=public
      AUTH_SECRET: "01234567890123456789012345678901"
      AUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
